<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <title th:replace="${title}">Games</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 px-3 rounded">
    <a class="navbar-brand" th:href="@{/games}">Games App</a>
    <a th:href="@{/games/new}" class="btn btn-primary ms-auto">Add Game</a>
</nav>

<th:block th:replace="${content}"/>

</body>
</html>
