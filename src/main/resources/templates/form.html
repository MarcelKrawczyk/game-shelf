<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${formTitle}">Form</title>
</head>
<body>
<main>
    <h4 th:text="${formTitle}">Form</h4>
    <hr/>

    <form th:action="${action}" th:object="${game}" method="post" style="max-width: 500px;">

        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" th:field="*{title}" class="form-control"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label for="developer" class="form-label">Developer</label>
            <input type="text" id="developer" th:field="*{developer}" class="form-control"
                   th:classappend="${#fields.hasErrors('developer')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{developer}"></div>
        </div>

        <div class="mb-3">
            <label for="year" class="form-label">Year</label>
            <input type="number" id="year" th:field="*{year}" class="form-control"
                   th:classappend="${#fields.hasErrors('year')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{year}"></div>
        </div>

        <div class="mb-3">
            <label for="genre" class="form-label">Genre</label>
            <input type="text" id="genre" th:field="*{genre}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="rating" class="form-label">Rating (0-10)</label>
            <input type="number" id="rating" th:field="*{rating}" class="form-control"
                   min="0" max="10" step="0.1"
                   th:classappend="${#fields.hasErrors('rating')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{rating}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/games}" class="btn btn-secondary ms-2">Cancel</a>

    </form>
</main>
</body>
</html>
